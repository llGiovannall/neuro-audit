<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Neuro Audit IDE - Workspace</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>

    <script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                fontFamily: {
                    mono: ['JetBrains Mono', 'monospace'],
                },
                colors: {
                    'brand-bg': '#0a0a0a',
                    'brand-border': '#222222',
                    'brand-sidebar': '#131313',
                    'brand-activity': '#0e0e0e',
                    'brand-highlight': '#d4f1d4',
                    'brand-neon': '#39ff14',
                }
            }
        }
    }
    </script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            max-height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .neon-glow { box-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }
    </style>
</head>
<body class="flex flex-col h-screen w-screen font-mono bg-brand-bg text-white antialiased">

    <header class="h-12 flex justify-between items-center px-4 z-50 bg-brand-bg border-b border-brand-border shrink-0">
        <div class="flex items-center gap-4 w-[260px]">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-brand-activity flex items-center justify-center border border-brand-border">
                    <span ><img src="./assets/logo.webp" style="height: 26px; width: 26px;"></img></span>
                </div>
                <div>
                    <h1 class="text-[14px] font-bold tracking-tighter text-white leading-none">NEURO AUDIT_v1.0</h1>
                    <p class="text-[11px] text-gray-500 mt-1">KERNEL_v42.0</p>
                </div>
            </div>
        </div>
        <div class="flex-1 flex justify-center items-center">
            <span class="text-[12px] text-gray-300 uppercase tracking-widest">WORKSPACE 42</span>
        </div>
        <div class="flex items-center gap-6 text-[13px] text-white">
            <div class="flex items-center gap-2">
                <span class="text-gray-400 text-[11px] uppercase tracking-widest">SANITY LEVEL</span>
                <div class="w-32 h-2 bg-brand-border rounded-none overflow-hidden flex items-center border border-brand-border">
                    <div id="sanity-progress-bar" class="h-full bg-brand-neon transition-all duration-500" style="width: 100%;"></div>
                </div>
                <span id="sanity-value" class="text-brand-neon">100%</span>
            </div>
            <button id="btn-audit" class="ml-4 border border-green-500 px-4 py-1 text-green-500 bg-transparent hover:bg-green-500 hover:text-black transition-all uppercase tracking-wider text-[12px] rounded-none font-bold">
            [ AUDIT ]
            </button>
            <button id="btn-generate-pdf" class="ml-4 border border-red-500 px-4 py-1 text-red-500 bg-transparent hover:bg-red-500 hover:text-black transition-all uppercase tracking-wider text-[12px] rounded-none font-bold">
            [ GERAR DOSSIÊ PDF ]
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">

        <aside class="w-[50px] bg-brand-activity border-r border-brand-border flex flex-col items-center py-4 z-40 shrink-0">

            <nav class="flex-1 flex flex-col items-center space-y-4 w-full">
                <a id="tab-explorer" class="text-brand-neon cursor-pointer relative group flex justify-center w-full" href="#">
                    <div class="absolute left-0 top-0 bottom-0 w-[2px] bg-brand-neon"></div>
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">folder_open</span>
                </a>

                <button type="button" id="tab-vcs" class="text-gray-500 hover:text-white cursor-pointer transition-colors w-full flex justify-center bg-transparent border-none">
                    <span class="material-symbols-outlined pointer-events-none">account_tree</span>
                </button>

                <button type="button" id="tab-analytics" class="text-gray-500 hover:text-white cursor-pointer transition-colors w-full flex justify-center bg-transparent border-none">
                    <span class="material-symbols-outlined pointer-events-none">analytics</span>
                </button>
            </nav>

            <div class="mt-auto pb-2 flex justify-center w-full">
                <button type="button" id="tab-settings" class="text-gray-500 hover:text-white cursor-pointer transition-colors bg-transparent border-none">
                    <span class="material-symbols-outlined pointer-events-none">settings</span>
                </button>
            </div>

        </aside>

        <aside id="sidebar-explorer" class="w-[250px] bg-brand-sidebar border-r border-brand-border flex flex-col z-30 shrink-0">

            <div class="py-2 px-4 border-b border-brand-border flex justify-between items-center bg-[#111]">
                <span id="root-folder-name" class="text-[11px] text-gray-300 uppercase tracking-widest font-bold truncate max-w-[120px]">
                    EXPLORER 4.2
                </span>

                <div class="flex items-center gap-1">
                    <button id="btn-new-file" class="text-gray-400 hover:text-brand-neon transition-colors p-1" title="Novo Arquivo">
                        <span class="material-symbols-outlined text-[16px]">note_add</span>
                    </button>
                    <button id="btn-new-folder" class="text-gray-400 hover:text-brand-neon transition-colors p-1" title="Nova Pasta">
                        <span class="material-symbols-outlined text-[16px]">create_new_folder</span>
                    </button>
                    <button id="btn-open-folder" class="text-gray-400 hover:text-brand-neon transition-colors p-1 ml-1 border-l border-brand-border" title="Abrir Workspace">
                        <span class="material-symbols-outlined text-[16px]">folder_open</span>
                    </button>
                </div>
            </div>

            <nav class="flex-1 overflow-y-auto custom-scrollbar py-2">
                <ul id="file-tree-container" class="px-2"></ul>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col relative bg-brand-bg rounded-none min-w-0">
            <main class="flex-1 flex flex-col relative z-0 overflow-hidden rounded-none">
                <section class="flex-1 flex flex-col min-h-0 bg-brand-bg relative">
                    <div id="editor-tabs-container" class="flex bg-brand-sidebar border-b border-brand-border h-8 items-end px-1 gap-1 relative z-10">
                        </div>

                    <div id="editor-container" class="flex-1 bg-brand-bg overflow-hidden relative z-0"></div>
                    <div id="audit-report-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[9999] flex items-center justify-center p-6">

                        <div class="w-full max-w-3xl bg-[#0a0a0a] border-2 border-green-500 flex flex-col max-h-[85vh] shadow-[0_0_50px_rgba(34,197,94,0.15)] overflow-hidden">

                            <div class="flex justify-between items-center shrink-0 border-b border-green-500/30 p-6 bg-[#0a0a0a] z-10">
                                <h1 class="text-red-500 text-3xl font-bold tracking-widest drop-shadow-[0_0_8px_rgba(239,68,68,0.5)] m-0">
                                    NEURO AUDIT REPORT
                                </h1>
                                <button id="btn-close-report" class="border border-green-500 px-6 py-2 text-green-500 hover:bg-green-500 hover:text-black transition-colors font-bold uppercase tracking-wider text-sm">
                                    FECHAR
                                </button>
                            </div>

                            <div id="audit-report-content" class="overflow-y-auto custom-scrollbar flex-1 p-6">
                                </div>

                        </div>
                    </div>

                    <div id="image-viewer-container" class="hidden absolute top-8 left-0 right-0 bottom-0 z-20 bg-brand-bg flex items-center justify-center p-8">
                        <img id="image-viewer-img" src="" class="max-w-full max-h-full object-contain border border-brand-border shadow-[0_0_15px_rgba(57,255,20,0.1)]">
                    </div>
                </section>
            </main>
        </div>
    </div>

    <section class="h-[240px] bg-brand-sidebar flex flex-col relative border-t border-brand-border rounded-none w-full shrink-0">
        <div class="h-8 border-b border-brand-border flex items-center px-4 justify-between bg-brand-activity">
            <span class="text-[11px] text-gray-400 uppercase tracking-widest font-bold">CONSOLE Aplha_0.42</span>
        </div>

        <div class="flex-1 overflow-hidden relative rounded-none flex flex-col">
            <div id="terminal-container" class="w-full h-full p-2 pl-4"></div>

            <div class="absolute bottom-4 right-4 bg-brand-activity p-2 flex items-center gap-3 rounded-none border border-brand-border pointer-events-none z-10">
                <div class="flex flex-col">
                    <span class="text-[11px] text-gray-500">SYSTEM STATUS</span>
                    <span class="text-[12px] text-gray-300">CPU Load: 42%</span>
                </div>
                <div class="flex gap-[2px] h-4">
                    <div class="w-2 h-full bg-[#d4f1d4]"></div><div class="w-2 h-full bg-[#d4f1d4]"></div><div class="w-2 h-full bg-[#d4f1d4]"></div><div class="w-2 h-full bg-[#d4f1d4]"></div><div class="w-2 h-full bg-brand-border"></div><div class="w-2 h-full bg-brand-border"></div><div class="w-2 h-full bg-brand-border"></div><div class="w-2 h-full bg-brand-border"></div><div class="w-2 h-full bg-brand-border"></div><div class="w-2 h-full bg-brand-border"></div>
                </div>
            </div>
        </div>
    </section>

    <script type="module" src="js/main.js"></script>
</body>
</html>
